<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 210" style="width:100%;max-width:660px;" font-family="system-ui,-apple-system,sans-serif">

  <!-- shared legend (top left) -->
  <rect x="20" y="8" width="8" height="8" rx="1" fill="#378ADD"/>
  <text x="32" y="16" font-size="10" fill="#999">Before</text>
  <rect x="72" y="8" width="8" height="8" rx="1" fill="#1D9E75"/>
  <text x="84" y="16" font-size="10" fill="#999">After</text>

  <!-- ── Panel 1: JSON ── -->
  <text x="110" y="34" text-anchor="middle" font-size="13" font-weight="500" fill="#333">JSON</text>

  <text x="68" y="56" text-anchor="middle" font-size="11" font-weight="500" fill="#378ADD">15.6 ms</text>
  <rect x="40" y="60" width="56" height="109" rx="3" fill="#378ADD"/>

  <rect x="124" y="167" width="56" height="2" rx="1" fill="#1D9E75"/>
  <text x="152" y="163" text-anchor="middle" font-size="11" font-weight="500" fill="#1D9E75">0.35 ms</text>

  <line x1="20" y1="169" x2="200" y2="169" stroke="#e0e0e0" stroke-width="1"/>
  <text x="68"  y="181" text-anchor="middle" font-size="11" fill="#bbb">v17</text>
  <text x="152" y="181" text-anchor="middle" font-size="11" fill="#bbb">v18</text>
  <rect x="68" y="189" width="84" height="16" rx="4" fill="#E1F5EE"/>
  <text x="110" y="201" text-anchor="middle" font-size="11" font-weight="500" fill="#0F6E56">44.6× faster</text>

  <!-- divider -->
  <line x1="225" y1="4" x2="225" y2="206" stroke="#e8e8e8" stroke-width="1"/>

  <!-- ── Panel 2: LiquidHTML ── -->
  <text x="330" y="34" text-anchor="middle" font-size="13" font-weight="500" fill="#333">LiquidHTML</text>

  <text x="288" y="56" text-anchor="middle" font-size="11" font-weight="500" fill="#378ADD">2,250 ms</text>
  <rect x="260" y="60" width="56" height="109" rx="3" fill="#378ADD"/>

  <rect x="344" y="167" width="56" height="2" rx="1" fill="#1D9E75"/>
  <text x="372" y="163" text-anchor="middle" font-size="11" font-weight="500" fill="#1D9E75">36 ms</text>

  <line x1="240" y1="169" x2="420" y2="169" stroke="#e0e0e0" stroke-width="1"/>
  <text x="288" y="181" text-anchor="middle" font-size="11" fill="#bbb">JS</text>
  <text x="372" y="181" text-anchor="middle" font-size="11" fill="#bbb">Wasm</text>
  <rect x="288" y="189" width="84" height="16" rx="4" fill="#E1F5EE"/>
  <text x="330" y="201" text-anchor="middle" font-size="11" font-weight="500" fill="#0F6E56">62.8× faster</text>

  <!-- divider -->
  <line x1="445" y1="4" x2="445" y2="206" stroke="#e8e8e8" stroke-width="1"/>

  <!-- ── Panel 3: ES5 ── -->
  <text x="550" y="34" text-anchor="middle" font-size="13" font-weight="500" fill="#333">ES5</text>

  <text x="508" y="56" text-anchor="middle" font-size="11" font-weight="500" fill="#378ADD">3,308 ms</text>
  <rect x="480" y="60" width="56" height="109" rx="3" fill="#378ADD"/>

  <rect x="564" y="167" width="56" height="2" rx="1" fill="#1D9E75"/>
  <text x="592" y="163" text-anchor="middle" font-size="11" font-weight="500" fill="#1D9E75">55 ms</text>

  <line x1="460" y1="169" x2="640" y2="169" stroke="#e0e0e0" stroke-width="1"/>
  <text x="508" y="181" text-anchor="middle" font-size="11" fill="#bbb">JS</text>
  <text x="592" y="181" text-anchor="middle" font-size="11" fill="#bbb">Wasm</text>
  <rect x="508" y="189" width="84" height="16" rx="4" fill="#E1F5EE"/>
  <text x="550" y="201" text-anchor="middle" font-size="11" font-weight="500" fill="#0F6E56">60.3× faster</text>

</svg>
